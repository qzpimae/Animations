	function initializeAnts() {
		const protoAnt = {
			x: 50, 
			y: 50,
			a: 0,
			c: 0, //hue 0-360
			//n_0 e_1 s_2 w_3
			o: 0
		}

		const antTotal = 4

		for (let i = 0; i < antTotal; i++) {

			const newAnt = {...protoAnt}
			newAnt.x = Math.round(Math.random() * 100);
			newAnt.y = Math.round(Math.random() * 100);
			
			newAnt.c = (i/antTotal) * 360;
			//newAnt.c = Math.round(Math.random() * 360);



			ants.push(newAnt);
		}

	function initializeState() {
		
		state.splice(0,state.length)

		for(let i = 0; i < 100; i++) {
			state.push([])
			for (let j = 0; j < 100; j++) {
				// state[i].push(Math.round(Math.random()))
				state[i].push(0)

			}
		}

	}
	

	function updateAnts () {

		for(let i = 0; i < ants.length; i++){
			const ant = ants[i];
			
			try {
				if (state[ant.x][ant.y]) {
					ant.o = ant.o < 3 ? ant.o + 1 : 0;
				} else {
					ant.o = ant.o > 0 ? ant.o - 1 : 3;
				}
		
				state[ant.x][ant.y] = state[ant.x][ant.y] ? 0 : 1;

				switch (ant.o) {
					case 0:
						ant.y = ant.y+1 < 100 ? ant.y+1 : 0
						break;
					case 1:
						ant.x = ant.x+1 < 100 ? ant.x+1 : 0
						break;
					case 2:
						ant.y = ant.y > 0 ? ant.y-1 : 99
						break;
					case 3:
						ant.x = ant.x > 0 ? ant.x-1 : 99
						break;
						
				}

				
				

			} catch (err) {

				// console.log("OUTOFBOUNDS");
			}


		}

		
		
	}

	function renderState () {

		//render game state (show which pixels are 'alive')
		for(let i = 0; i < 100; i++) {

			for (let j = 0; j < 100; j++) {

				let pixelState = state[i][j];
				if (!pixelState) continue; 
				ctx.fillStyle =  `hsl(${((i * j)/10) + frames % 360}, 100%, 60%)`;//'deeppink';

		}
	}

		while (obj.offsetParent)

		}

		ypos -= obj_top;
