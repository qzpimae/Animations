
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>My website</title>
</head>
<body id="body">



<div id="root">
	<h1>Big</h1>
	<p>this is gonna be small</p>

<img src="./img1.png"></img>
<img src="./img2.png"></img>
<img src="./img3.png"></img>

<button id="butt" >Click ME!!!</button> 
<canvas id="can" height=600 width=600 ></canvas>

</div>


</body>


<script type="text/javascript">



	const butt = document.getElementById("butt");
	const body = document.getElementById("root");

	butt.innerText = Math.round( Math.random() * 10);

	butt.onclick = () => {
		butt.innerText = Math.round( Math.random() * 10);
		body.background =  "red"
		makeLines(Math.random()*100);
	}

	const canvas = document.getElementById("can");


	canvas.style = `display: block;
                top: 0px;
                left: 0px;
                cursor: none;
                margin:auto;
                background-color: black`;

	document.body.style = `margin: 0;
	background-color: black`;

	const ctx = canvas.getContext("2d");
	
	ctx.fillStyle="black"
	ctx.rect(0,0,100,100);

	ctx.fill();

	ctx.background = "black"

	let frames = 0


	const state = []

	let ant = {
		x: 50, y: 50, 
		//n_0 e_1 s_2 w_3
		o: 0
	}

	initializeAnt()
	loop()

	function loop () {

		frames++
		//console.log(frames);

		butt.innerText = frames

		ctx.fillStyle = 'hsla(0, 0%, 0%, .02)';


                ctx.fillRect(0, 0, 600, 600);
		makeLines(Math.random()*10)
		updateAnt();
		updateAnt();

		renderState();


		

		

		 setTimeout(window.requestAnimationFrame, 0, loop)
	}


	function genColor () {
			const r1 = frames % 360
			const r2 = (Math.random() * 50) + 50
			const r3 = (Math.random() * 50) + 50

			return `hsl(${r1},${r2}%,${r3}%)`

	}


	

	function makeLines(num) {
	
		let count = 0

		while(count < num) {
		
			count++;
			const r1 = frames % 360
			const r2 = (Math.random() * 50) + 50
			const r3 = (Math.random() * 50) + 50

			ctx.strokeStyle = `hsl(${r1},${r2}%,${r3}%)`
		
			const x1 = ant.x*6
			const x2 = ant.x*6 + (Math.random() * 100) - 50
			const y1 = ant.y*6
			const y2 = ant.y*6 + (Math.random() * 100) - 50

			ctx.beginPath()
			ctx.moveTo(x1, y1)
			
			ctx.lineTo(x2, y2)
			ctx.stroke();



//ctx.moveTo(300 + Math.sin(frames/100) * 100, 300 + Math.cos(frames/100) * 100)

		
		}
	}


	



	function initializeAnt() {
		
		
		for(let i = 0; i < 100; i++) {
			state.push([])
			for (let j = 0; j < 100; j++) {
				//state[i].push(Math.round(Math.random()))
				state[i].push(0)

			}
		}

	}
	

	function updateAnt () {


		//console.log(ant);
		if (state[ant.x][ant.y]) {
			ant.o = ant.o < 3 ? ant.o + 1 : 0;
		} else {
			ant.o = ant.o > 0 ? ant.o - 1 : 3;
		}

		state[ant.x][ant.y] = state[ant.x][ant.y] ? 0 : 1;
		
		if (ant.o == 0) {
			ant.y++
		} else if (ant.o == 1) {
			ant.x++
		} else if (ant.o == 2) {
			ant.y--
		} else if (ant.o == 3) {
			ant.x--
		}

		
		
	}

	function renderState () {



		for(let i = 0; i < 100; i++) {

			for (let j = 0; j < 100; j++) {

				let pixelState = state[i][j];
				if (!pixelState) continue;

				ctx.fillStyle = pixelState ? genColor() : 'black'
				ctx.fillRect(i*6, j*6, 6,6)
			}
		}
		
	}

</script>
</html>
