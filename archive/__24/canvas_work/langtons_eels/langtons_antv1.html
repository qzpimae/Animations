	function loop () {

		frames++
		//console.log(frames);

		butt.innerText = cycles

		ctx.fillStyle = 'hsla(0, 0%, 100%, .05)';

        ctx.fillRect(0, 0, width, height);
		//makeLines(Math.random()*10)

		for (let i = 0; i < cyclesPerFrame; i++) {
			updateAnts();
			cycles++
		}

		renderState();

        renderMouse();

		 if (!pauseAnimation) setTimeout(window.requestAnimationFrame, 30, loop)

	function resetGame() {

	function initializeAnts() {
		const protoAnt = {
			x: 0, 
			y: 0,
			a: 0,
			c: 0, //hue 0-360
			//n_0 e_1 s_2 w_3
			o: 0
		}

		ants.splice(0,ants.length);

		const antTotal = 2

		for (let i = 0; i < antTotal; i++) {

			const newAnt = {...protoAnt}
			newAnt.x = 100+i*4;//Math.round(Math.random() * cols);
			newAnt.y = 100;//Math.round(Math.random() * rows);
			
			newAnt.c = (i/antTotal) * 360;
			//newAnt.c = Math.round(Math.random() * 360);



			ants.push(newAnt);
		}


	}

	function initializeState() {
		
		state.splice(0,state.length)

		for(let i = 0; i < rows; i++) {
			state.push([])
			for (let j = 0; j < cols; j++) {
				// state[i].push(Math.round(Math.random()))
				state[i].push(0)

			}
		}

	}
	

	function updateAnts () {

		for(let i = 0; i < ants.length; i++){
			const ant = ants[i];
			
			try {
				if (state[ant.x][ant.y]) {
					ant.o = ant.o < 3 ? ant.o + 1 : 0;
				} else {
					ant.o = ant.o > 0 ? ant.o - 1 : 3;
				}
		
				state[ant.x][ant.y] = state[ant.x][ant.y] ? 0 : 1;

				switch (ant.o) {
					case 0:
						ant.y = ant.y+1 < rows ? ant.y+1 : 0
						break;
					case 1:
						ant.x = ant.x+1 < cols ? ant.x+1 : 0
						break;
					case 2:
						ant.y = ant.y > 0 ? ant.y-1 : rows-1
						break;
					case 3:
						ant.x = ant.x > 0 ? ant.x-1 : cols-1
						break;
						
				}

				
				

			} catch (err) {

				// console.log("OUTOFBOUNDS");
			}


		}

		
		
	}

	function renderState () {

		//render game state (show which pixels are 'alive')
		for(let i = 0; i < rows; i++) {

			for (let j = 0; j < cols; j++) {

				let pixelState = state[i][j];
				if (!pixelState) continue; 
				ctx.fillStyle = 'black';//`hsl(${((i * j)/10) + frames % 360}, 100%, 60%)`;//'deeppink';

				ctx.fillRect(i*pixelSize, j*pixelSize, pixelSize,pixelSize)
			}
		}


		//render pos of ants
		for(let i = 0; i < ants.length; i++){
			const ant = ants[i];

			ctx.fillStyle = `hsl(${ant.c}, 100%, 60%)`;//'deeppink';
			ctx.fillRect(ant.x*pixelSize, ant.y*pixelSize, pixelSize, pixelSize)	

		
		}
	}

	function renderMouse() {

	function onMouseClick (event) {
		console.log(mosPos);
		ctx.fillStyle ='deeppink';
		ctx.fillRect(event.target.mousex, event.target.mousey, pixelSize, pixelSize)	
	}

	
	function findObjectCoords(mouseEvent) {

		let obj = canvas,
			obj_left = 0,
			obj_top = 0,
			xpos,
			ypos;

		while (obj.offsetParent)
		{
		obj_left += obj.offsetLeft;
		obj_top += obj.offsetTop;
		obj = obj.offsetParent;
		}
		if (mouseEvent)
		{
		xpos = mouseEvent.pageX;
		ypos = mouseEvent.pageY;
		}

		xpos -= obj_left;
		ypos -= obj_top;

		mosPos.x = xpos
		mosPos.y = ypos

	}
