<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>paint on the web - life</title>
    <script src="./p5.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: black;
            overflow: hidden; 
        }
    </style>
</head>
<body>
    <script>
        // const urlParams = new URLSearchParams(window.location.search);
        // let algSelect = parseInt(urlParams.get('alg')) || 0;
        // let colorMode = parseInt(urlParams.get('color')) || Math.floor(Math.random()*3);
        // let fadeOn = 1 || parseInt(urlParams.get('fade'));
        // let cellSize = Math.max(parseInt(urlParams.get('scale')),3) || 7;
        // let randomSelect = parseInt(urlParams.get('ran')) || 0;
        // let ranCycle = parseInt(urlParams.get('ranwait')) || 1000;
        // let frameBuffer = Math.min(Math.max(parseInt(urlParams.get('buff')),1),50) || 5;

        const urlParams = new URLSearchParams(window.location.search);

        const algParam = parseInt(urlParams.get('alg'));
        const colorParam = parseInt(urlParams.get('color'));
        const fadeParam = parseInt(urlParams.get('fade'));
        const scaleParam = parseInt(urlParams.get('scale'));
        const randomParam = parseInt(urlParams.get('ran'));
        const ranwaitParam = parseInt(urlParams.get('ranwait'));
        const buffParam = parseInt(urlParams.get('buff'));

        let algSelect = algParam || 1;
        let colorMode = colorParam || 0;//Math.floor(Math.random() * 3);
        let fadeOn = fadeParam || 1;
        let cellSize = Math.max(scaleParam, 3) || 5;
        let randomSelect = randomParam || 0;
        let ranCycle = ranwaitParam || 1000;
        let frameBuffer = Math.min(Math.max(buffParam, 1), 50) || 2;

        // console.log(fadeOn, randomSelect); 

        let gameState = [];
        let frameCount = 0;
        let time = 0; 
        let brushSize = 5;
        let numRows, numCols;
        let isPaused = false;

        let showBanner = true;
        let bannerX;
        let bannerSpeed = 2;
        let bannerText = 'The canvas is ready for you to paint on                              ';
        let bannerSize = 24;

        function setup() {

            numRows = Math.floor(windowHeight/cellSize);
            numCols = Math.floor(windowWidth/cellSize);

            // console.log(height);
            

            createCanvas(windowWidth, windowHeight);
            background(0);
            initializeGameState();
            bannerX = width;  // Start banner in the center
        }

        function draw() {

            time += 1; 
            frameCount++;
            let hueValue = time % 360; 
            let colorValue = `hsl(${hueValue}, 60%, 50%)` 
            
            if (mouseIsPressed || (touches.length > 0)) {
                stroke(colorValue);
                strokeWeight(brushSize);
                // Draw lines for mouse or touch interactions
                if (mouseIsPressed) {
                    line(mouseX, mouseY, pmouseX, pmouseY);
                    activateCell(mouseX,mouseY)
                } 
            }


            if (!isPaused) {
                
                translate((width - numCols * cellSize) / 2, (height - numRows * cellSize) / 2);  // Center the grid
                if (frameCount % frameBuffer == 0) {

                    if (fadeOn == 1) {
                        let filterColor =`hsla(0,0%,0%, 0.1)`
                        background(filterColor)
                    } 


                    updateGameState();  // Calculate the next game state
                    drawGrid();         // Draw the cells on the canvas


                }

                if (frameCount % ranCycle == 0 && randomSelect > 0) {
                    randomLifeDrop()
                    ranCycle = Math.floor(Math.random() * 100) + 300
                }

                // Draw the banner if it's enabled
                if (showBanner) {
                    drawBanner(bannerSize);
                } else if (bannerSize > 0) {
                    bannerSize-=.1;
                    drawBanner(bannerSize)
                }

            }


        }

        function initializeGameState() {

            const starterAlg = algSelect || 0; //Math.floor(Math.random() * 5)

            gameState = [];
            for (let i = 0; i < numRows; i++) {
                let row = [];
                for (let j = 0; j < numCols; j++) {

                    let makeAlive = 0;

                    switch (starterAlg) {
                        case 0:
                            break;
                        case 1: 
                            makeAlive = (j == Math.floor(numCols/2)) ? 1 : 0
                            break;
                        case 2:
                            makeAlive = (j == Math.floor(numCols/2)) && i > 2 && i < numRows-2 ? 1 : 0
                            break;
                        case 3:
                            makeAlive = (j == Math.floor(numCols/2)) && (i != Math.floor(numRows/2)) ? 1 : 0
                            break;
                        case 4:
                            makeAlive = Math.random() > .9 ? 1 : 0
                            break;
                        case 5:
                            makeAlive = (i == Math.floor(numRows/2)) ? 1 : 0
                            break;
                    }
                
                    row.push({
                        alive: makeAlive,//Math.random() > .5 ? 1 : 0, // Cells start as dead
                        age: 0,
                        color: ranInt(360),
                        x: i, 
                        y: j
                    });
                }
                gameState.push(row);
            }
        }

        function updateGameState() {
            let nextGameState = [];
            for (let i = 0; i < numRows; i++) {
            let newRow = [];
            for (let j = 0; j < numCols; j++) {
                const neighbors = countNeighbors(i, j);
                const currentCell = gameState[i][j];
                if (currentCell.alive) {
                    newRow.push({ 
                        ...currentCell,
                        alive: neighbors === 2 || neighbors === 3 ? 1 : 0, 
                        age: neighbors === 2 || neighbors === 3 ? currentCell.age + 1 : 0, 
                        color: currentCell.color });
                } else {
                    newRow.push({ 
                        ...currentCell,
                        alive: neighbors === 3 ? 1 : 0, 
                        age: neighbors === 3 ? 1 : 0, 
                        color: currentCell.color});
                }
            }
            nextGameState.push(newRow);
            }
            gameState = nextGameState;
        }

          // Count the number of live neighbors for a given cell
        function countNeighbors(x, y) {
            let count = 0;
            for (let i = -1; i <= 1; i++) {
            for (let j = -1; j <= 1; j++) {
                if (i === 0 && j === 0) continue; // Skip the current cell
                const row = (x + i + numRows) % numRows;  // Wrap around edges
                const col = (y + j + numCols) % numCols;  // Wrap around edges
                count += gameState[row][col].alive;
            }
            }
            return count;
        }

        function calColor(cell, choice) {
            let hue, lightness;
            // console.log(choice);
            
            switch (choice || colorMode) {
                case 2:
                        hue = Math.abs(360-time+cell.x)%360;
                        lightness = ((100 - cell.age * 12.75) % 50) + 40 ;
                        return `hsl(${(hue > 0 ? hue : 0)}, 0%, ${lightness}%)`;
                break;
                    case 1:
                        hue = Math.abs(360-time+cell.x)%360;
                        lightness = ((100 - cell.age * 12.75) % 50) + 40 ;
                        return `hsl(${(hue > 0 ? hue : 0)}, ${40+cell.age*5}%, ${lightness}%)`;
                    break;
                case 0:
                default:
                        hue = 340-cell.age*5;
                        lightness = ((100 - cell.age * 12.75) % 50) + 40 ;
                        saturation = 100 - cell.age;
                        return `hsl(${(hue > 0 ? hue : 0)}, ${saturation}%, ${lightness}%)`;
                        // return `hsl(${(hue > 0 ? hue : 0)+cell.color}, 50%, ${lightness}%)`;
                    break;
            }

        }

          // Draw the grid on the canvas
        function drawGrid() {
            for (let i = 0; i < numRows; i++) {
            for (let j = 0; j < numCols; j++) {
                const cell = gameState[i][j];
                const cS = cellSize;

                noStroke();
                if (cell.alive) {
                    fill(calColor(cell))
                    rect(j * cS, i * cS, cS, cS);
                }
              }
            }
        }

        function randomLifeDrop () {
            for (let i = 0; i < randomSelect; i++) {

                const ranx = Math.floor(gameState.length * Math.random())
                const rany = Math.floor(gameState[0].length * Math.random())
                gameState[ranx][rany].alive = true;


                // const ranLen = Math.ceil(Math.random() * 6)
                // for (let j = 0; j < ranLen; j++) {
                //     gameState[ranx-j][rany].alive = true;
                    
                // }
            }
        }

        function drawBanner(size) {
            textSize(size);
            textFont('Courier');
            fill(`hsl(${time}, 100%, 50%)`);  // Colorful text using HSL
            stroke(255, 255, 255);            // White stroke for text
            strokeWeight(2);                  // Thin stroke outline for text
            textAlign(LEFT, CENTER);

            let textW = textWidth(bannerText) * 2;  // Width of the banner text

            // Calculate the position, wrapping the text seamlessly using modulo
            let modX = bannerX % textW;

            // Draw the background for the text
            let textH = textSize() * 1.5;   // Estimate the height of the text
            fill(0, 0, 0, 150);            // Semi-transparent black background
            noStroke();                    // No stroke for the background
            rect(modX - textW - 5, height - textH - 40, textW + 10, textH+10);  // Background for first position
            rect(modX - 5, height - textH - 40, textW + 10, textH+10);          // Background for second position

            // Draw the text twice to make it wrap around smoothly
            fill(`hsl(${time}, 100%, 50%)`);  // Text fill
            stroke(255, 255, 255);            // White stroke for text
            strokeWeight(2);
            text(bannerText, modX - textW, height - 50);  // First position
            text(bannerText, modX, height - 50);          // Second position (wrap-around)

            // Update banner position
            bannerX -= bannerSpeed;
        }



        // First touch or mouse press removes the banner
        function mousePressed() {
            showBanner = false;
        }

        function touchStarted() {
            showBanner = false;
        }

        function mouseDragged() {
            activateCell(mouseX, mouseY);
        }

        // Handle touch input for mobile
        function touchMoved() {

            return false; // Prevent default touch events (scrolling)
        }

        function keyPressed() {
            switch (key) {
                case ',':
                frameBuffer = max(1, frameBuffer - 1);
                break;
                case '.':
                frameBuffer = min(50, frameBuffer + 1);
                break;
                case ' ':
                    isPaused = !isPaused
                break;
                case 't':
                    fadeOn = !fadeOn
                break;
            }
        }


        function activateCell(x, y) {

            // console.log(x,y);
            

            // background(x)
            // First, convert the screen coordinates to canvas-relative coordinates
            let canvasX = x - (width - numCols * cellSize) / 2;
            let canvasY = y - (height - numRows * cellSize) / 2;

            // console.log(`Touch at screen (${x}, ${y}), canvas (${canvasX}, ${canvasY})`);

            // Then, convert canvas coordinates to grid coordinates
            let col = Math.floor(canvasX / cellSize);
            let row = Math.floor(canvasY / cellSize);

            // console.log(`Grid cell at (${row}, ${col})`);

            // Ensure the coordinates are within the grid boundaries
            if (col >= 0 && col < numCols && row >= 0 && row < numRows) {
            gameState[row][col] = { alive: 1, age: 0 }; // Activate the cell (make it alive)
            }
        }

        function ranInt (max) {
            return Math.floor(Math.random()*max)
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight); // Resize canvas when window size changes
        }
    </script>
</body>
</html>
