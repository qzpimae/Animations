
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Pink Eels</title>
</head>
<body>
	<div id="root">
		<canvas id="canvas"></canvas>
		<button id="butt" >Click ME!!!</button> 
		<p style="text-align: center;">[g's eels v0.9.1] --- based on <a href="https://en.wikipedia.org/wiki/Langton%27s_eel" target="_blank">Langton's Ant algorithm</a> created by <a href="https://cancelled.work/pi">{g}</a></p>
		<p style="text-align: center;">[controls] space: pause - r: reset - w/s speed control</p>
	</div>
</body>


<script type="text/javascript">

	//[g's Eels] --- Langtons Ant algorithm v0.9.1 @gqz 

	//CONTROLS:
	console.log(`
		Click: spawn eel
		Up/Down Arrow: increase/decrease simulation itterations per-frame (speed control)
		Space: pause simulation
		R: reset simulation
	`);
	
	// RULES: __________________________________________________________________
	// square grid, pixels have a binary state (ie. black & white)
	// an 'eel' is on one of these pixels. the eel has an orientation (N/S/E/W)
	// the eel moves LEFT if the pixel it's on is (0/BLACK) and RIGHT if its on (1/WHITE)
	// when the eel moves, it leaves the pixel it was previously on the OPPOSITE of its current state 0 or 1
	
	//getElementById allows us to access DOM elements and manipulate them in JS
	const butt = document.getElementById("butt");
	const body = document.getElementById("root");
	const canvas = document.getElementById("canvas");

	//hides the button (only used for testing atm)
	butt.hidden = true
	//add event listeners for keyboard / mouse controls
	document.addEventListener('keydown', userInputEvent, false);
	canvas.onmousemove = findObjectCoords;
	canvas.onclick = onMouseClick
	//onmousemove the mouse position will be updated
	const mosPos = {x:0,y:0}
	

	
	let height = 400;
	let width = 400;
	let pixelSize = 4;
	let rows = height/pixelSize;
	let cols = width/pixelSize;
	let initalEelCount = 0;
	
	canvas.height = height;
	canvas.width = width;
	canvas.style = `display: block;
                top: 0px;
                left: 0px;
                cursor: none;
                margin:auto;
				margin-top: 2em;
                background-color: black;
				border: 10px solid deeppink;`

	document.body.style = `margin: 0;
				background-color: gray;
				color: white;`;

	const ctx = canvas.getContext("2d");
	
	//Setting the background before the animation starts
		// ctx.fillStyle="black";
		// ctx.rect(0,0,100,100);
		// ctx.fill();

	//simpler alt code for setting the background, 
	//but the previous version will clear the screen if there is already something drawn
	ctx.background = "black"


	//count for how many animation frames have eslapse
	let frames = 0
	//how many itteration of the simulation should be calculated for each animation frame
	let itterationsPerFrame = 1
	let itterations //how many itterations have passed

	//toggle for pausing the simulation
	let pauseAnimation = false

	//this array store the data for the similation field. 
	//each pixel is represented as a 0 or 1, and they are store here in a 2d array structure;
	//each sub-array is a row within the 2D grid, and each element is a pixel within that row
	const state = []

	//an eel changes the state as it moves, there can be more than one eel in this sim, 
	//so we use an array to easily preform all the same code to each one on each itteration of the sim
	let eels = []

	//before the similation loop is started, the state and eels will be initaialized
	initializeState()
	initializeEels()

	//start the animation loop
	loop()

	function loop () {
		const backgroundLightness = Math.abs(Math.sin(frames%1000/1000)) * 100;

		//itterate the frame count
		frames++
		//console.log(frames); 

		//update the button innerText to display the current frame count
		butt.innerText = frames;

		//this is a very transparent color (alpha is the last arg)
		//this allows for a smooth fading affect when the eels move around
		ctx.fillStyle = `hsla(0, 0%, ${backgroundLightness}%, .05)`;
		//fill the whole screen with this transparent color
		ctx.fillRect(0, 0, height, width);

		//update the eels position, and modify the game state according to Langton's Ant algorithm
		for (let i = 0; i < itterationsPerFrame; i++) {
			updateEels();
			itterations++
		}

		//render the current simulation field's state as well as the eels positions
		renderState();
		//render mouse pos
		renderMouse();

		// an auto reset timer. the animation will reset every 1000 frames
		//if (frames % 1000 == 0) resetSim();		

		if (!pauseAnimation) setTimeout(window.requestAnimationFrame, 30, loop)
	}

	function resetSim() {
		//simply reinitialize the state and the eels and similation field will be as if the page was refreshed
		//more could be done here if resets are to have more logic
		initializeState();
		initializeEels();
	}	

	function initializeEels() {
		const protoEel = {
			x: 0, 
			y: 0,
			a: 0,
			c: 0, //hue 0-360
			//n_0 e_1 s_2 w_3
			o: 0
		}

		//erase all the previous eels
		eels.splice(0,eels.length);

		//this loop will itterate for the number of eels to be generated on initialization
		//note: currently eels could be placed on the same spot, 
		//but they should immedietly diverge on the first itteration of the sim
		const numberOfEels = initalEelCount;
		for (let i = 0; i < numberOfEels; i++) {

			const newEel = {...protoEel}
			newEel.x = Math.round(Math.random() * cols);
			newEel.y = Math.round(Math.random() * rows);
			
			newEel.c = newEel.y * 3;

			eels.push(newEel);
		}


		//TEST
		eels.push({
			x: cols/2, 
			y: rows/2,
			a: 0,
			c: 0, //hue 0-360
			//n_0 e_1 s_2 w_3
			o: 0
		},{
			x: cols/2 + 2, 
			y: rows/2,
			a: 0,
			c: 0, //hue 0-360
			//n_0 e_1 s_2 w_3
			o: 3
		})


	}

	function spawnEel (x, y) {
		//set the orientation of new eels to be random
		const orientation = Math.floor(Math.random() * 4)
		eels.push({
			x: x, 
			y: y,
			a: 0,
			c: 0, //hue 0-360
			o: orientation
		})
	}

	function initializeState() {
		//delete all of states elements
		state.splice(0,state.length)

		for(let i = 0; i < rows; i++) {
			state.push([])
			for (let j = 0; j < cols; j++) {
				// state[i].push(Math.round(Math.random()))
				state[i].push(0)

			}
		}

	}
	

	function updateEels () {

		// console.log(eels.length);


		for(let i = 0; i < eels.length; i++){
			const eel = eels[i];
			try {
			if (state[eel.x][eel.y]) {
				eel.o = eel.o < 3 ? eel.o + 1 : 0;
			} else {
				eel.o = eel.o > 0 ? eel.o - 1 : 3;
			}
	
			state[eel.x][eel.y] = state[eel.x][eel.y] ? 0 : 1;

			switch (eel.o) {
					case 0:
						eel.y = eel.y+1 < rows ? eel.y+1 : 0
						break;
					case 1:
						eel.x = eel.x+1 < cols ? eel.x+1 : 0
						break;
					case 2:
						eel.y = eel.y > 0 ? eel.y-1 : rows-1
						break;
					case 3:
						eel.x = eel.x > 0 ? eel.x-1 : cols-1
						break;		
				}
			} catch (err) {
				console.log(err);
			}
		}
		
	}

	
	function renderState () {

		//render game state (show which pixels are 'alive')
		for(let i = 0; i < rows; i++) {

			for (let j = 0; j < cols; j++) {

				let pixelState = state[i][j];
				if (!pixelState) continue; 
				ctx.fillStyle = 'deeppink';//'chartreuse';//'black';//`hsl(${((i * j)/10) + frames % 360}, 100%, 60%)`;//'deeppink';

				ctx.fillRect(i*pixelSize, j*pixelSize, pixelSize,pixelSize)
			}
		}


		//render pos of eels
		for(let i = 0; i < eels.length; i++){
			const eel = eels[i];

			ctx.fillStyle = 'chartreuse';//`hsl(${eel.c}, 100%, 60%)`;//
			ctx.fillRect(eel.x*pixelSize, eel.y*pixelSize, pixelSize, pixelSize)	

		
		}
	}

	
	function renderMouse() {

		ctx.fillStyle = 'hsla(0, 0%, 100%, .05)'
		ctx.beginPath();
		ctx.rect(mosPos.x, mosPos.y, pixelSize, pixelSize);
		ctx.fill()
		
	}

	function onMouseClick (event) {
		// console.log(mosPos);
		// ctx.fillStyle ='deeppink';
		// ctx.fillRect(mosPos.x, mosPos.y, pixelSize, pixelSize)	
		spawnEel(Math.round(mosPos.x/pixelSize), Math.round(mosPos.y/pixelSize))
		
	}

	
	function findObjectCoords(mouseEvent) {
		let obj = canvas,
			obj_left = 0,
			obj_top = 0,
			xpos,
			ypos;
		while (obj.offsetParent)
		{
		obj_left += obj.offsetLeft;
		obj_top += obj.offsetTop;
		obj = obj.offsetParent;
		}
		if (mouseEvent)
		{
		xpos = mouseEvent.pageX;
		ypos = mouseEvent.pageY;
		}
		xpos -= obj_left;
		ypos -= obj_top;
		mosPos.x = xpos
		mosPos.y = ypos
	}

	
    //USER INPUT LOGIC
    function userInputEvent(input) {
        switch (input.code) {
            case "Space":
                pauseAnimation = !pauseAnimation;
                if (!pauseAnimation) {
                    loop()
                }
            break;
	    case "KeyW":
            case "ArrowUp":
                itterationsPerFrame = itterationsPerFrame < 3333 ? itterationsPerFrame+1 : 500;
            break;
	    case "KeyS":
            case "ArrowDown":
                itterationsPerFrame = itterationsPerFrame > 1 ? itterationsPerFrame-1 : 1
            break;
            case "KeyR":
                resetSim();
            break;
        }
    }

</script>
</html>
