<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>444</title>
    <style type="text/css">
        body {
            background-color: rgb(0, 0, 0);
            margin: 0px;
            overflow: hidden;
            height: 100vh;
        }
        canvas {
            display: block;
        }
    </style>
        <script src="./p5.js"></script>
        <script src="./p5.sound.min.js"></script>
        <script src="./toxiclib.min.js"></script>
</head>
<body>
    <script>
        let seed, mosPos, time, timeMax, timeForward, speed, disMult, targetDisMult, sizeMult, targetSzMult;
        let clearScreen, pauseAnimation, showLines, showDots, inColor, automated, lightOff;
        let mic, decacy, presses, vol, volMax = 0;
        const simNoise = toxi.math.noise.simplexNoise;

        function setup() {
            createCanvas(windowWidth, windowHeight);
            noCursor();
            noStroke();

            frameRate(60);

            seed = 3.1415;//random(1000);
            mosPos = { x: 1000, y: 1000 };

            mic = new p5.AudioIn();
            mic.start();

            time = 10;
            timeMax = Infinity;
            timeForward = true;
            speed = 0;
            disMult = 0.0012;
            targetDisMult = 0.003;
            sizeMult = 50;
            targetSzMult = 50;
            clearScreen = false;
            pauseAnimation = false;
            showLines = true;
            showDots = true;
            inColor = true;
            automated = false;
            lightOff = 0;
            sustained = false;
            sustainedTime = 0;

            decay = 1;
            presses = 0;

            

            stroke(255);
            fill(255);
            strokeWeight(0.1);
        }

        const logA = () => {
            console.log("A");
        }


        function draw() { 
            // console.log(time);
            
            // if (time > 1000) {
            //     setup()
            // }

            // console.log(Math.round(speed*100)/100);
            // console.log(disMult);
             ////////////////////////////////////////////////////////////////////////
                //update the speed based on volume
                // speed = speed > 2 ? speed / 1.05 : speed; 

                if ( speed > 0 ) {
                    speed -= speed*(decay * .01)
                } 

                if (speed < 1) {
                    sustained = false;
                    sustainedTime = sustainedTime > 0 ? sustainedTime-1 : sustainedTime

                }
                

                if (sustained) sustainedTime++
                // speed = speed > 2 ? speed - 1 : speed;

                // console.log(mic);

 

                vol = mic.getLevel();  

                // if (vol > volMax ) volMax = vol;
                // console.log(vol + "\n" + volMax + "\n\n_______________________________________");

                if (vol > .02) {
                    sustained = true
                    speed = (1 + (vol * 10)) * 3
                }


                ////////////////////////////////////////////////////////////////////////

            if (pauseAnimation) return;

            if (clearScreen) { 
                
                background(0);
            } else {
                let filterColor =`hsla(0,0%,0%, 0.07)`
                background(filterColor)
            }

            time += (speed / 50) * sustainedTime/100 ;
            

            if (automated) {
                disMult *= (1 + sin(time / 100) / 100);
            }

            translate(width/2, height/2)
            
            createAnimation(time);

            translate(-width/2, -height/2)
        }

        function mouseClicked() {
            // console.log("test");
            userStartAudio() 
            speedJumpStart()
        }

        function touchStarted() {
            userStartAudio() 
            speedJumpStart()
        }

        function speedJumpStart () {
            if (++presses > 4) {
                speed += (Math.random() * 2)
                sustained = true
            }
        }

        function createAnimation(s) {
            const limits = {
                sX: 0,
                eX: width / sizeMult,
                sY: 0,
                eY: height / sizeMult
            };

            const points = [];

            for (let x = limits.sX; x < limits.eX; x++) {
                points.push([]);
                for (let y = limits.sY; y < limits.eY; y++) {
                    const distance = sqrt(pow((x * sizeMult) - (width / 2), 2) + pow((y * sizeMult) - (height / 2), 2));
                    const noiseX = ((x / sizeMult) + seed) + s / 100 + (distance / (113377 * disMult));
                    const noiseY = ((y / sizeMult) + seed) + s / 100 + (distance / (113377 * disMult));
                    const N1 = simNoise.noise(noiseX, noiseY);
                    const N2 = simNoise.noise(noiseY, noiseY);
                    const radius = 2 + N1 + N2 > 1 ? 2 + N1 + N2 : 1;
                    const X = (Math.cos(x)*55)  + (N1 * sizeMult - N2 * sizeMult);
                    const Y = (Math.sin(y)*55) + (N1 * sizeMult + N2 * sizeMult) * distance * disMult;

                    const point = { x: X, y: Y, r: radius * 1.5, dis: distance };
                    points[x - limits.sX].push(point);
                }
            }

            renderPoints(points);
        }

        function renderPoints(arr) {
            for (let i = 0; i < arr.length; i++) {
                for (let j = 0; j < arr[i].length; j++) {
                    const p = arr[i][j];
                    const colorVar = (p.dis / 3) * p.r + 144;
                    const pColor = `hsl(${colorVar}, ${inColor ? 100 : 0}%, ${(colorVar / 4 % 80) + lightOff}%)`;

                    if (showLines) {
                        const px = arr[i + 1] ? arr[i + 1][j] : null;
                        const py = arr[i][j + 1] ? arr[i][j + 1] : null;
                        const pxy = arr[i + 1] && arr[i + 1][j + 1] ? arr[i + 1][j + 1] : null;

                        stroke(pColor);
                        noFill()
                        if (px || py || pxy) {
                            beginShape();
                            vertex(p.x, p.y);
                            if (px) vertex(px.x, px.y);
                            if (py) vertex(py.x, py.y);
                            endShape(CLOSE);
                        }
                    }

                    if (showDots) {
                        fill("black");
                        ellipse(p.x, p.y, p.r / 2, p.r / 2);
                    }
                }
            }
        }

        function keyPressed() {
            switch (key) {
                case ' ':
                    pauseAnimation = !pauseAnimation;
                    if (!pauseAnimation) loop();
                    else noLoop();
                    break;
                case 'ArrowUp':
                    speed = min(speed + 0.05, 40);
                    break;
                case 'ArrowDown':
                    speed = max(speed - 0.05, 0.05);
                    break;
                case 'ArrowLeft':
                    sizeMult = min(sizeMult + 0.1, 300);
                    break;
                case 'ArrowRight':
                    sizeMult = max(sizeMult - 0.1, 0.1);
                    break;
                case 'q':
                    disMult *= 2;
                    break;
                case 'w':
                    disMult /= 2;
                    break;
                case 'a':
                    disMult *= 1.1;
                    break;
                case 's':
                    disMult /= 1.1;
                    break;
                case 'l':
                    showLines = !showLines;
                    if (!showDots && !showLines) showDots = true;
                    break;
                case 'o':
                    showDots = !showDots;
                    if (!showDots && !showLines) showLines = true;
                    break;
                case 'z':
                    clearScreen = !clearScreen;
                    break;
                case 'c':
                    inColor = !inColor;
                    break;
                case 'u':
                    lightOff -= 1;
                    break;
                case 'i':
                    lightOff += 1;
                    break;
                case 'p':
                    automated = !automated;
                    break;
                case '9':
                    speed /= 2;
                    break;
                case '0':
                    speed *= 2;
                    break;
                case 'x-':
                    decay =  decay == 1 ? 10 : 1;
                    break;
            }
        }

        function mouseMoved() {
            mosPos.x = mouseX;
            mosPos.y = mouseY;
        }

        function windowResized() {
            resizeCanvas(windowWidth, windowHeight);
        }
    </script>
</body>
</html>
