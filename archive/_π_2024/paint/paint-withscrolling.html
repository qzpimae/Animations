                            break;
                        case 2:

                        case 3:

                            break;
                        case 4:

                            break;
                        case 5:
                            makeAlive = (i == Math.floor(numRows/2)) ? 1 : 0
                            break;
                    }
                
                    row.push({
                        alive: makeAlive,//Math.random() > .5 ? 1 : 0, // Cells start as dead

                        color: ranInt(360),

                        y: j

        function updateGameState() {
            let nextGameState = [];
            for (let i = 0; i < numRows; i++) {
            let newRow = [];
            for (let j = 0; j < numCols; j++) {
                const neighbors = countNeighbors(i, j);
                const currentCell = gameState[i][j];

                if (currentCell.alive) {
                    
                    // if (currentCell.age == 2) newCellCount++

                    newRow.push({ 
                        ...currentCell,
                        alive: neighbors === 2 || neighbors === 3 ? 1 : 0, 
                        age: neighbors === 2 || neighbors === 3 ? currentCell.age + 1 : 0, 
                        color: currentCell.color });
                } else {

                    newRow.push({ 
                        ...currentCell,
                        alive: neighbors === 3 ? 1 : 0, 
                        age: neighbors === 3 ? 1 : 0, 
                        color: currentCell.color});
                }
            }
            nextGameState.push(newRow);
            }
            gameState = nextGameState;
        }
        
        
          // Count the number of live neighbors for a given cell
        function countNeighbors(x, y) {
            let count = 0;
            for (let i = -1; i <= 1; i++) {
            for (let j = -1; j <= 1; j++) {
                if (i === 0 && j === 0) continue; // Skip the current cell
                const row = (x + i + numRows) % numRows;  // Wrap around edges
                const col = (y + j + numCols) % numCols;  // Wrap around edges
                count += gameState[row][col].alive;
            }
            }
            return count;
        }

        function scrollCellsUpdate() {
            if (!feedbackOn) return;

            for (let i = 0; i < numRows; i++) {
                for (let j = 0; j < numCols; j++) {

                    let cell = gameState[i][j];

                    // Update the "logical coordinates"
                    cell.x += horScroll;
                    cell.y += vertScroll;

                    // --- WRAP Y ---
                    if (cell.y < 0) {
                        cell.y = numCols - 1;
                        cell.alive = 1;
                    } else if (cell.y >= numCols) {
                        cell.y = 0;
                        cell.alive = 1;
                    }

                    // --- WRAP X ---
                    if (cell.x < 0) {
                        cell.x = numRows - 1;
                        cell.alive = 1;
                    } else if (cell.x >= numRows) {
                        cell.x = 0;
                        cell.alive = 1;
                    }
                }
            }
        }

        // Shifts the entire Life grid downward one row, wrapping bottom -> top.
        // Matches Processing’s row-swapping behavior.
        function scrollWholeGrid() {
            let lastRow = gameState[numRows - 1];

            // shift each row down
            for (let r = numRows - 1; r > 0; r--) {
                gameState[r] = gameState[r - 1];

                // update x-coordinates
                for (let c = 0; c < numCols; c++) {
                    gameState[r][c].x = r;
                }
            }

            // wrap last row to top
            gameState[0] = lastRow;
            for (let c = 0; c < numCols; c++) {
                gameState[0][c].x = 0;
            }
        }




        function calColor(cell, choice, cursorLineCal) {
            let hue, lightness;

            if (cursorLineCal) {
                switch (choice || colorMode) {
                    case 0:
                            return `hsl(0, 0%, ${lightMode ? 0 : 100}%)`;
                        break;
                    case 2:
                            hue = Math.abs((360-time*10)%360);
                            return `hsl(${hue}, 100%, 72%)`;
                        break;
                    case 1:
                    default:
                           
                            return `hsl(333, 88%,${77+Math.round(Math.random()*5)}%)`;
                            // return `hsl(${(hue > 0 ? hue : 0)+cell.color}, 50%, ${lightness}%)`;
                        break;
                }
            }
            
            switch (choice || colorMode) {
                case 0:
                        lightness = cell.age*(1+Math.abs(30*Math.sin(frameCount/444)));
                        saturation = 100 - cell.age;
                        return `hsl(0, 0%, ${lightness}%)`;
                    break;
                case 2:
                        hue = Math.abs(360-time+cell.x)%360;
                        lightness = ((100 - cell.age * 12.75) % 50) + 40 ;
                        saturation = 100 - cell.age;
                        return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
                    break;
                case 1:
                default:
                        hue = 340-cell.age*5;
                        lightness = ((100 - cell.age * 12.75) % 50) + 40 ;
                        saturation = 100 - cell.age * 5;
                        return `hsl(${(hue > 0 ? hue : 0)}, ${saturation}%, ${lightness}%)`;
                        // return `hsl(${(hue > 0 ? hue : 0)+cell.color}, 50%, ${lightness}%)`;
                    break;
            }

        }

          // Draw the grid on the canvas
            function drawGrid() {
                for (let i = 0; i < numRows; i++) {
                    for (let j = 0; j < numCols; j++) {

                        if (cell.alive) {
                            fill(calColor(cell));
                            rect(cell.y * cellSize, cell.x * cellSize, cellSize, cellSize);
                        }
                    }
                }
            }

        function processControl (input) {

            const numCtrls = Object.keys(menu.ctrls).length;
            const ctrls = Object.values(menu.ctrls)

            if (input == 'back') {
                menu.level = menu.level > 1 ? menu.level - 1 : menu.level == 1 ? 0 : 1;

            } else if (menu.level == 0) return; 

            if (input == 'left' ){
                menu.level = menu.level == 1 ? 2 : 2;

            } else if (input == 'up') {
                if (menu.level == 1) {
                    menu.ctrlSel = menu.ctrlSel < numCtrls - 1 ? menu.ctrlSel+1 : 0;
                } else if (menu.level == 2) {
                    ctrls[menu.ctrlSel].mod()
                }
            }
            
        }

        function keyPressed(event) {

                    break;
                case '/':
                    scrollGrid = !scrollGrid;
                    break;
                    
                    
            }

        }

        function activateCell(x, y) {

            // background(x)
            // First, convert the screen coordinates to canvas-relative coordinates
            let canvasX = x - (width - numCols * cellSize) / 2;
            let canvasY = y - (height - numRows * cellSize) / 2;

            // console.log(`Touch at screen (${x}, ${y}), canvas (${canvasX}, ${canvasY})`);

            // Then, convert canvas coordinates to grid coordinates
            let col = Math.floor(canvasX / cellSize);
            let row = Math.floor(canvasY / cellSize);

            // console.log(`Grid cell at (${row}, ${col})`);

            // Ensure the coordinates are within the grid boundaries
            if (col >= 0 && col < numCols && row >= 0 && row < numRows) {
                gameState[row][col] = { alive: 1, age: 0 }; // Activate the cell (make it alive)
            }
        }

        function ranInt (max) {
            return Math.floor(Math.random()*max)
        }

        // function windowResized() {
        //     resizeCanvas(windowWidth, windowHeight); // Resize canvas when window size changes
        // }
    </script>
