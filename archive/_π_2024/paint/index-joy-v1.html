        const curHour = new Date().getHours();

        const urlParams = new URLSearchParams(window.location.search);

        const algParam = parseInt(urlParams.get('alg'));
        const colorParam = parseInt(urlParams.get('color'));
        const fadeParam = parseInt(urlParams.get('fade'));
        const clearParam = parseInt(urlParams.get('clear'));
        const scaleParam = parseInt(urlParams.get('scale'));
        const randomParam = parseInt(urlParams.get('ran'));
        const ranwaitParam = parseInt(urlParams.get('ranwait'));
        const buffParam = parseInt(urlParams.get('buff'));
        const uiParam = parseInt(urlParams.get('ui'));
        const lightModeParam = parseInt(urlParams.get('light'));
        const cursorLineParam = parseInt(urlParams.get('cl'));
        const brushSizeParam = parseInt(urlParams.get('bs'));
        const modeParam = (urlParams.get('mode'));

        const defaultColor = Math.round(Math.random()*2);
        const defaultFade = Math.round(Math.random()*1);
        const defaultClear = 0;
        const defaultAlg = 0;
        const defaultLight = curHour < 17 && curHour > 6 ? 1 : 0;
        const defaultBuff = 4;
        const defaultCellSize = 6;
        const defaultBrushSize = 4;
        
        const algMax = 6; //used in ran algo selection (uses floor so number should be 1 greater than actual limit, 0 is included)

        let initializedSettings = false;

        let algSelect = algParam || defaultAlg;
        let modeSelect = modeParam != null ? modeParam.split(' ') : []
        let colorMode = isNaN(colorParam) ? defaultColor : colorParam;//Math.floor(Math.random() * 3);
        let fadeOn = isNaN(fadeParam) ? defaultFade : fadeParam;
        let clearOn = isNaN(clearParam) ? defaultClear : clearParam;
        let cellSize = Math.max(scaleParam, 3) || defaultCellSize;
        let randomSelect = randomParam || 0;
        let ranCycle = ranwaitParam || 1000;
        let frameBuffer = Math.min(Math.max(buffParam, 1), 50) || defaultBuff;
        let lightMode = isNaN(lightModeParam) ? defaultLight : lightModeParam;

        let showUI = isNaN(uiParam) ? 1 : uiParam;
        let brushSize = isNaN(brushSizeParam) ? defaultBrushSize : brushSizeParam;;
        let cursorLine = isNaN(cursorLineParam) ? 1 : cursorLineParam;

        let newCellCount = 0;

        let feedbackOn = true;
        let scrollRevive = true;
        let horScroll = 0;
        let vertScroll = 0;

        let mouseXOff = 0;
        let mouseYOff = 0;
       
        let joy = {
            x: 0,       // -1..1 (relative)
            y: 0,       // -1..1 (relative)
            strength: 0, // 0..1
            dir: 'center', // "up","down","left","right","upleft",...
            active: false, // currently dragging
            pressed: false, // currently being pressed/touched
            size: 0,     // px (computed in setup)
            baseX: 0,    // screen coords of center
            baseY: 0,
            deadzone: .12
        };



        const menu = {
            level: 0,
            ctrlSel: 0,

            // .val are only used for the menu display and can be different than actually variables value
            // ie  for buff. it makes more sense to have faster speeds be displayed as higher value
            //.trigger - set to true if the mod is just trigger not a variable control - .val will be ommited from display
            ctrls: {
                // fade: {n: 'fade', val: fadeOn, 
                //     mod() {fadeOn = fadeOn == 1 ? 0 : 1; this.val = fadeOn}
                // },
                light: {n: 'light', val: lightMode,
                    mod() {lightMode = lightMode == 1 ? 0 : 1; this.val = lightMode}
                },
                buff: {n: 'speed', val: frameBuffer, buffMax: 10, up_dir: true, //up_dir: update direction 
                    mod() {

                        const increaseSpeed = this.up_dir;

                        frameBuffer -= increaseSpeed ? 1 : -1;

                        frameBuffer = frameBuffer > this.buffMax ? this.buffMax : frameBuffer < 1 ? 1 : frameBuffer;
                        
                        this.val = this.buffMax - frameBuffer + 1;
                        
                        if (frameBuffer == this.buffMax || frameBuffer == 1) {
                            this.up_dir = !this.up_dir
                            
                        } 

                        // frameBuffer=frameBuffer > 1 ? frameBuffer-1 : 8; 
                    }
                },
                color: {n: 'color', val: colorMode, names: ['ink', 'sakura', 'gay'],
                    mod() {colorMode=colorMode < 2 ? colorMode+1 : 0; this.val = colorMode}
                },
                // alg: {n: 'alg', val: algSelect, 
                //     mod() {algSelect=algSelect < 5 ? algSelect+1 : 0; this.val = algSelect}
                // },
                reset: {n: 'reset', val: 0, trigger: true,
                    mod() {
                        const ranAlg = Math.floor(Math.random()*algMax)
                        algSelect = ranAlg;
                        initializeGameState()
                    }
                }

            },
            setFromGlobal () { //set menu value from global ones to match
                this.ctrls.light.val = lightMode;
                this.ctrls.buff.val = this.ctrls.buff.buffMax - frameBuffer + 1;
                this.ctrls.color.val = this.val = colorMode
            }
        }


        let gameState = [];
        let frameCount = 0;
        let time = 0; 
        let numRows, numCols;
        let isPaused = false;
        let borderOn = false;
        let showBanner = true;
        let bannerX;
        let bannerSpeed = 2;
        let bannerText = '';
        let bannerSize = 24;
        
        let width, height, uiSize;

     

        function setup() {

            width = windowWidth;
            height = windowHeight;
            uiSize = width / 15;

            logMessage()
            logControls()
            createCanvas(windowWidth, windowHeight);
            background(lightMode?360:0);
            initializeGameState();
            logSettings()
            bannerX = width;  // Start banner in the center
            initJoystick();

        }



        function draw() {

            time += 1; 
            frameCount++;
            
            if (mouseIsPressed || (touches.length > 0)) {
                    if (cursorLine) {
                        stroke(calColor(gameState[0][0], colorMode, true));
                        strokeWeight(brushSize);
                        line(mouseX, mouseY, pmouseX, pmouseY);
                    }

                    activateCell(mouseX,mouseY)
            }


            if (!isPaused) {
                
                translate((width - numCols * cellSize) / 2, (height - numRows * cellSize) / 2);  // Center the grid
                if (frameCount % frameBuffer == 0) {

                    if (fadeOn == 1) {
                        let filterColor =`hsla(0,0%,${lightMode?100:0}%, 0.1)`
                        background(filterColor)
                    } 
                    
                    if (clearOn) {
                        let filterColor =`hsl(0,0%,${lightMode?100:0}%)`
                        background(filterColor)
                    }

                    updateJoystickPhysics();
                    scrollCellsUpdate();
                    
                    updateGameState();  // Calculate the next game state
                    drawGrid();         // Draw the cells on the canvas


                }

                if (frameCount % ranCycle == 0 && randomSelect > 0) {
                    randomLifeDrop()
                    ranCycle = Math.floor(Math.random() * 100) + 300
                }

                
               

            }

            if (showUI) {
             
                renderUI();
            }

        }

        function initializeGameState() {

            if (!initializedSettings) {
                setModes()                                                                  
                menu.setFromGlobal()

                initializedSettings = true;
            }
            
            numRows = Math.floor(windowHeight/cellSize);
            numCols = Math.floor(windowWidth/cellSize);

            const starterAlg = algSelect || 0; //Math.floor(Math.random() * 5)

            newCellCount = 0;

            gameState = [];
            for (let i = 0; i < numRows; i++) {
                let row = [];
                for (let j = 0; j < numCols; j++) {

                    let makeAlive = 0;

                    switch (starterAlg) {
                        case 0:
                            break;
                        case 1: 
                            makeAlive = (i == Math.floor(numRows/2)) && j > 2 && j < numCols-2 ? 1 : 0 
                            break;
                        case 2:
                            makeAlive = (j == Math.floor(numCols/2)) && i > 2 && i < numRows-2 ? 1 : 0
                            break;
                        case 3:
                            makeAlive = (j == Math.floor(numCols/2)) && (i != Math.floor(numRows/2)) ? 1 : 0
                            break;
                        case 4:
                            makeAlive = Math.random() > .9 ? 1 : 0
                            break;
                        case 5:
                            makeAlive = (i == Math.floor(numRows/2)) ? 1 : 0
                            break;
                    }
                
                    row.push({
                        alive: makeAlive,//Math.random() > .5 ? 1 : 0, // Cells start as dead
                        age: 0,
                        color: ranInt(360),
                        x: i, 
                        y: j,
                        posX: i*cellSize,
                        posY: j*cellSize,
                    });
                }
                gameState.push(row);
            }

            if (borderOn) {
                cellSize--
            }
        }

        function initJoystick() {
            joy.size = Math.round(uiSize * 2.2); 
            const margin = Math.max(50, uiSize * 0.5);
            joy.baseX = margin + joy.size / 1.5;
            joy.baseY = height - margin - joy.size / 2;
        }

        function renderUI () {

            fill(lightMode?0:360)

            if (menu.level > 0) {
                
                noStroke()
                //render up button
                rect(width - uiSize*2, height - uiSize*4, uiSize, uiSize)

                //render left button
                if (menu.level === 1) rect(width - uiSize*4, height - uiSize*2, uiSize, uiSize)

                //render back button
                rect(width - uiSize*2, height - uiSize*2, uiSize, uiSize)

            } else {

                //render back button
                noStroke()
                rect(width - uiSize*2, height - uiSize*2, uiSize, uiSize)
            }

            if (menu.level == 2) {
                fill(lightMode?0:360)
                rect(width/2-uiSize*2.05, height - uiSize*1.55, uiSize*4, uiSize/1.6)
            }

            //write ui text
            fill(lightMode?360:0)
            rect(width/2-uiSize*2, height - uiSize*1.5, uiSize*3.9, uiSize/2)
            
            // stroke(360);            // White stroke for text
            // strokeWeight(1);                  // Thin stroke outline for text
            fill(lightMode?0:360)
            textSize(14)
            textAlign(LEFT, CENTER);
            textFont('Courier');

            const controlInfo = Object.values(menu.ctrls)
            const curControl = controlInfo[menu.ctrlSel]
            const ctrlVal = curControl.names ? curControl.names[curControl.val] : curControl.val;
            const ctrlName = curControl.n;
            const isTrig = curControl.trigger

            const ctrlText = menu.level == 0 ? `paint by π` : isTrig ? ctrlName : `${ctrlName}  | ${ctrlVal}`;

            text(ctrlText, width/2-uiSize*1.7, height - uiSize*1.25)


            // ----- draw joystick (bottom-left) -----
            noStroke();
            push();
                // recompute base if uiSize / window dimensions changed
                initJoystick()

                translate(0, 0);
                // base ring
                fill(lightMode ? 0 : 360, 0.06);
                ellipse(joy.baseX, joy.baseY, joy.size, joy.size);

                // base inner
                // fill(lightMode ? 0 : 360);
                stroke(lightMode ? 360 : 0);
                strokeWeight(1);
                // slightly translucent ring
                // fill(lightMode ? 'rgba(0,0,0,0.12)' : 'rgba(255,255,255,0.06)');
                ellipse(joy.baseX, joy.baseY, joy.size * 0.92, joy.size * 0.92);

                // draw directions hint (optional subtle cross)
                noStroke();
                fill(lightMode ? 0 : 360);
                // if (joy.dir !== 'center') {
                    // highlight active direction
                    push();
                    translate(joy.baseX, joy.baseY);
                    const dotX = joy.x * (joy.size/2 - joy.size*0.18);
                    const dotY = joy.y * (joy.size/2 - joy.size*0.18);
                    // base stick shadow
                    fill('rgba(0,0,0,0.25)');
                    ellipse(dotX + 2, dotY + 2, joy.size * 0.35, joy.size * 0.35);
                    // stick
                    fill(lightMode ? 360 : 0);
                    ellipse(dotX, dotY, joy.size * 0.35, joy.size * 0.35);
                    fill(lightMode ? 'rgb(0,0,0)' : 'rgba(255,255,255)');
                    ellipse(dotX, dotY, joy.size * 0.28, joy.size * 0.28);
                
                    pop();

            pop();
            noStroke();


            
        }

        function updateGameState() {
            let nextGameState = [];
            for (let i = 0; i < numRows; i++) {
            let newRow = [];
            for (let j = 0; j < numCols; j++) {
                const neighbors = countNeighbors(i, j);
                const currentCell = gameState[i][j];

                if (currentCell.alive) {
                    
                    // if (currentCell.age == 2) newCellCount++

                    newRow.push({ 
                        ...currentCell,
                        alive: neighbors === 2 || neighbors === 3 ? 1 : 0, 
                        age: neighbors === 2 || neighbors === 3 ? currentCell.age + 1 : 0, 
                        color: currentCell.color });
                } else {

                    newRow.push({ 
                        ...currentCell,
                        alive: neighbors === 3 ? 1 : 0, 
                        age: neighbors === 3 ? 1 : 0, 
                        color: currentCell.color});
                }
            }
            nextGameState.push(newRow);
            }
            gameState = nextGameState;
        }
        
        
        // Count the number of live neighbors for a given cell
        function countNeighbors(x, y) {
            let count = 0;
            for (let i = -1; i <= 1; i++) {
            for (let j = -1; j <= 1; j++) {
                if (i === 0 && j === 0) continue; // Skip the current cell
                const row = (x + i + numRows) % numRows;  // Wrap around edges
                const col = (y + j + numCols) % numCols;  // Wrap around edges
                count += gameState[row][col].alive;
            }
            }
            return count;
        }
        function updateJoystickPhysics() {
            // --- when held: follow pointer instantly (no bounce) ---
            if (joy.pressed) {
                // joy.x / joy.y already set in pointerMoveAt()
                // but clamp to -1..1 just in case
                joy.x = Math.max(-1, Math.min(1, joy.x));
                joy.y = Math.max(-1, Math.min(1, joy.y));
            } else {
                // --- when released: smoothly return to center ---
                const returnSpeed = 0.18;  // controls how fast it returns (0.1 = slow, 0.25 = snappy)
                joy.x = lerp(joy.x, 0, returnSpeed);
                joy.y = lerp(joy.y, 0, returnSpeed);

                // snap to exact zero when near center
                if (Math.abs(joy.x) < 0.001) joy.x = 0;
                if (Math.abs(joy.y) < 0.001) joy.y = 0;
            }

            // --- compute magnitude + direction ---
            const mag = Math.sqrt(joy.x * joy.x + joy.y * joy.y);
            joy.strength = Math.min(1, mag);

            if (joy.strength < joy.deadzone) {
                joy.dir = 'center';
                feedbackOn = false;
                horScroll = 0;
                vertScroll = 0;
                return;
            }

            feedbackOn = true;

            // strength-to-step mapping
            let step = 0;
            if (joy.strength > 0.10) step = 1;
            if (joy.strength > 0.20) step = 2;
            if (joy.strength > 0.33) step = 3;
            if (joy.strength > 0.65) step = 4;
            if (joy.strength > 0.80) step = 5;
            if (joy.strength > 0.95) step = 6;



            // // strength-to-step mapping
            // let step = 0;
            // if (joy.strength > 0.15) step = 1;
            // if (joy.strength > 0.20) step = 2;
            // if (joy.strength > 0.35) step = 3;
            // if (joy.strength > 0.50) step = 4;
            // if (joy.strength > 0.70) step = 5;
            // if (joy.strength > 0.85) step = 6;
            // if (joy.strength > 0.95) step = 7;

            // console.log(joy.strength);
            
            

            // axis → your scroll control mapping
            horScroll = joy.y < -joy.deadzone ?  1 * step :
                        joy.y >  joy.deadzone ? -1 * step : 0;

            vertScroll = joy.x < -joy.deadzone ?  1 * step :
                        joy.x >  joy.deadzone ? -1 * step : 0;

            // descriptive direction string
            const h = Math.abs(joy.x) > joy.deadzone ? (joy.x < 0 ? "left"  : "right") : "";
            const v = Math.abs(joy.y) > joy.deadzone ? (joy.y < 0 ? "up"    : "down")  : "";
            joy.dir = (v + h) || "center";
        }

        function updateJoyComputed() {
            // clamp and compute strength/dir quickly when pointerDown sets joy.x/y
            joy.x = Math.max(-1, Math.min(1, joy.x));
            joy.y = Math.max(-1, Math.min(1, joy.y));
            joy.strength = Math.min(1, Math.sqrt(joy.x*joy.x + joy.y*joy.y));
            // set a small velocity so it moves smoothly next tick
            joy.vx = 0;
            joy.vy = 0;
        }



        function scrollCellsUpdate() {
            if (feedbackOn) {

                for (let i = 0; i < numRows; i++) {
                    for (let j = 0; j < numCols; j++) {

                        let cell = gameState[i][j];

                        cell.x += horScroll;
                        cell.y += vertScroll;
                        
                        mouseXOff += horScroll;
                        mouseYOff += vertScroll;

                        // --- WRAP Y ---
                        if (cell.y <= 0) {
                            cell.y = numCols;
                            cell.alive = scrollRevive ? 1 : cell.alive
                        } else if (cell.y >= numCols) {
                            cell.y = 0;
                            cell.alive = scrollRevive ? 1 : cell.alive
                        }

                        // --- WRAP X ---
                        if (cell.x <= 0) {
                            cell.x = numRows;
                            cell.alive = scrollRevive ? 1 : cell.alive
                        } else if (cell.x >= numRows) {
                            cell.x = 0;
                            cell.alive = scrollRevive ? 1 : cell.alive
                        }
                    }
                }


            }


        }


        function calColor(cell, choice, cursorLineCal) {
            let hue, lightness;

            //BRUSH STROKE COLOR SCIENCE
            if (cursorLineCal) {
                switch (choice || colorMode) {
                    case 0:
                            return `hsl(0, 0%, ${lightMode ? 0 : 100}%)`;
                        break;
                    case 2:
                            hue = Math.abs((360-time*10)%360);
                            return `hsl(${hue}, 100%, 72%)`;
                        break;
                    case 1:
                    default:
                           
                            return `hsl(333, 88%,${77+Math.round(Math.random()*5)}%)`;
                            // return `hsl(${(hue > 0 ? hue : 0)+cell.color}, 50%, ${lightness}%)`;
                        break;
                }
            }
            //CELL COLOR SCIENCE
            switch (choice || colorMode) {
                case 0:
                        lightness = cell.age*(1+Math.abs(20*Math.sin(frameCount/444)));
                        return `hsl(0, 0%, ${lightness}%)`;
                    break;
                case 2:
                        hue = Math.abs(360-time+cell.x)%360;
                        lightness = 15+((100 - cell.age * 20) % 50)+cell.age*(1+Math.abs(30*Math.sin(frameCount/333)));;//((100 - cell.age * 9) % 50) + 50 ;
                        saturation = 100 - cell.age*2;
                        return `hsl(${hue}, ${saturation}%, ${lightness}%)`;
                    break;
                case 1:
                default:
                        hue = 340-cell.age*5;
                        lightness = ((100 - cell.age * 12.75) % 50) + 40 ;
                        saturation = 100 - cell.age * 5;
                        return `hsl(${(hue > 0 ? hue : 0)}, ${saturation}%, ${lightness}%)`;
                        // return `hsl(${(hue > 0 ? hue : 0)+cell.color}, 50%, ${lightness}%)`;
                    break;
            }
        } //end of calColor

        // Draw the cells to the canvas
        function drawGrid() {
            for (let i = 0; i < numRows; i++) {
                for (let j = 0; j < numCols; j++) {
                    const cell = gameState[i][j];

                    noStroke()
                    if (cell.alive) {
                        // strokeWeight(cellSize)
                        fill(calColor(cell));
                        rect(cell.posY, cell.posX, cellSize);
                    }
                }
            }
        }


        function randomLifeDrop () {
            for (let i = 0; i < randomSelect; i++) {
                
                const ranx = Math.floor(gameState.length * Math.random())
                const rany = Math.floor(gameState[0].length * Math.random())
                gameState[ranx][rany].alive = true;

            }
        }


        function detectUi () {

            let mX = mouseX, mY = mouseY;

            //ignore presses outside the menu region.
            if (mX >  width - uiSize*4 && mY > height - uiSize*4 ) {
                   //detect backbutton

                // console.log(width - uiSize*2, width - uiSize*2,  width - uiSize, width - uiSize);

                if (mX > width - uiSize*2 && mY > height - uiSize*2 && mX < width  &&  mY < height ) {
                    processControl('back')
                }  if (mX > width - uiSize*4 && mY > height - uiSize*2 && mX < width - uiSize*2.2 &&  mY < height ) {
                    processControl('left')
                }  if (mX > width - uiSize*2 && mY > height - uiSize*4 && mX < width &&  mY < height - uiSize*2.2) {
                    processControl('up')
                }  

            } 

        }


        let isTouchEvent = false;  // Flag to detect touch events

        function mouseClicked() {
            if (!isTouchEvent) {
                showBanner = false;
                detectUi();
            }
        }

        // Unified pointer handlers for joystick region vs painting/UI
        function pointerDownAt(px, py) {
            // if pressed inside joystick base area — start joystick control
            const dx = px - joy.baseX;
            const dy = py - joy.baseY;
            const dist = Math.sqrt(dx*dx + dy*dy);

            if (dist <= joy.size / 2) {
                joy.pressed = true;
                joy.active = true;
                // immediately set relative coordinates
                joy.x = dx / (joy.size/2);
                joy.y = dy / (joy.size/2);
                joy.vx = joy.vy = 0;
                updateJoyComputed();
                return true; // consumed by joystick
            }

            // otherwise fall back to your existing behaviour (e.g. painting or UI)
            showBanner = false;
            return false;
        }

        function pointerMoveAt(px, py) {
            if (!joy.pressed) return false;

            const dx = px - joy.baseX;
            const dy = py - joy.baseY;
            const r = Math.sqrt(dx*dx + dy*dy);
            const maxR = joy.size / 2;

            // clamp drag to joystick radius
            let clampedX = dx, clampedY = dy;
            if (r > maxR) {
                clampedX = (dx / r) * maxR;
                clampedY = (dy / r) * maxR;
            }

            // set joystick position directly (no momentum)
            joy.x = clampedX / maxR;   // -1..1
            joy.y = clampedY / maxR;   // -1..1

            return true;
        }


        function pointerUp() {
            // release joystick input
            joy.pressed = false;
            // keep active flag so momentum runs and returns to center
            return;
            }

            // p5 mouse/touch bridging
            function mousePressed() {
            // ignore if the click is inside the UI area on right (existing detectUi handles that on release)
            const consumed = pointerDownAt(mouseX, mouseY);
            if (!consumed) {
                // keep your prior behavior for non-joystick presses
                // (do not call detectUi here because your existing mouseClicked handles it)
            }
        }

        function mouseDragged() {
            pointerMoveAt(mouseX, mouseY);
        }

        function mouseReleased() {
            pointerUp();
        }

        function touchStarted() {
            // p5 'touches' array sometimes contains multiple touches; use the first
            if (touches && touches.length > 0) {
                const t = touches[0];
                const consumed = pointerDownAt(t.x, t.y);
                if (!consumed) {
                showBanner = false;
                isTouchEvent = true;
                }
            }
            return false; // prevent native scrolling
            }

        function touchMoved() {
            // update first touch position if joystick active
            if (touches && touches.length > 0) {
                pointerMoveAt(touches[0].x, touches[0].y);
            }
            return false;
        }

        function touchEnded() {
            // if joystick was pressed, release it
            pointerUp();
            // still run your UI detect on touch end as you had
            detectUi();
            // restore touch flag shortly after
            setTimeout(() => { isTouchEvent = false; }, 100);
            return false;
        }


        // --- NEW CONTROLS

        function processControl (input) {

            const numCtrls = Object.keys(menu.ctrls).length;
            const ctrls = Object.values(menu.ctrls)

            if (input == 'back') {
                menu.level = menu.level > 1 ? menu.level - 1 : menu.level == 1 ? 0 : 1;

            } else if (menu.level == 0) return; 

            if (input == 'left' ){
                menu.level = menu.level == 1 ? 2 : 2;

            } else if (input == 'up') {
                if (menu.level == 1) {
                    menu.ctrlSel = menu.ctrlSel < numCtrls - 1 ? menu.ctrlSel+1 : 0;
                } else if (menu.level == 2) {
                    ctrls[menu.ctrlSel].mod()
                }
            }
            
        }

        

        function keyPressed(event) {
            switch (key) {
                case ',':
                    frameBuffer = max(1, frameBuffer - 1);
                break;
                case '.':
                    frameBuffer = min(50, frameBuffer + 1);
                break;
                case ' ':
                    isPaused = !isPaused
                break;
                case 'f':
                    fadeOn = fadeOn < 1 ? fadeOn+1 : 0;
                break;
                case 'd':
                    clearOn = clearOn < 1 ? clearOn+1 : 0;
                break;
                case 'r':
                    initializeGameState()
                break;
                case 'c':
                    colorMode = colorMode < 3 ? colorMode+1 : 0;
                break;
                case 'l':
                    lightMode = lightMode < 1 ? lightMode+1 : 0;
                break;
                case 'q':
                    cursorLine = !cursorLine;
                break;
                case '\\':
                    showUI = !showUI;
                break;
                case 's':
                    logSettings();
                break;
                case 'ArrowLeft': 
                    vertScroll = vertScroll > 0 ? 0 : 1; 
                    break;
                case 'ArrowRight': 
                    vertScroll = vertScroll < 0 ? 0 : -1; 
                    break;
                case 'ArrowUp': 
                    horScroll = horScroll > 0 ? 0 : 1; 
                    break;
                case 'ArrowDown': 
                    horScroll = horScroll < 0 ? 0 : -1; 
                    break;
                case 'Shift': 
                    feedbackOn = !feedbackOn;
                    break;
                case '/':
                    scrollRevive = !scrollRevive;
                    break;
                case 'k':
                    skipGlitch = !skipGlitch;
                    break;
                    
                    
            }

        }

        function logMessage() {
            console.log("paint - game of life simulator. visit ./help to learn more");
            
        }
        function logControls() {
            console.log(`
                CONTROLS
                ------------------------------------------------
                <  >          Speed (frame buffer up/down)
                SPACE         Pause / Play
                F             Fade toggle
                R             Reset game
                C             Cycle color modes
                \\             Toggle UI
                S             Log settings
                L             Light / Dark mode
                Q             Cursor line toggle

                1–5           Direct algorithm select
                M             Menu on/off

                N             No wait (fast cycle)
                T             Change brush tip size
                A             Random algorithm
                G             Random mode (ran / vran / vvran)
                Z             Random background (colordrop)
            `);
        }

        function logSettings() {
            console.log(`
                CURRENT SETTINGS
                ------------------------------------------------
                Mode:             ${modeSelect}
                Algorithm:        ${algSelect}
                Paused:           ${isPaused ? 'yes' : 'no'}

                DISPLAY
                ------------------------------------------------

                Light Mode:       ${lightMode ? 'light' : 'dark'}
                Border:           ${borderOn ? 'on' : 'off'}
                Cursor Visible:   ${cursorLine ? 'on' : 'off'}
                Fade:             ${fadeOn ? 'on' : 'off'}

                COLOR
                ------------------------------------------------
                Color Mode:       ${colorMode}
                Random Level:     ${randomSelect}
                Random Cycle:     ${ranCycle}

                SIZE / SPEED
                ------------------------------------------------
                Cell Size:        ${cellSize}
                Brush Size:       ${brushSize}
                Frame Buffer:     ${frameBuffer}   (lower = faster)

            `);
        }


        function setModes() {

                    break;

                //DISABLED until borders are fixed

        }


        function activateCell(x, y) {

            // background(x)
            // First, convert the screen coordinates to canvas-relative coordinates
            let canvasX = x - (width - numCols * cellSize) / 2;
            let canvasY = y - (height - numRows * cellSize) / 2;

            // console.log(`Touch at screen (${x}, ${y}), canvas (${canvasX}, ${canvasY})`);

            // Then, convert canvas coordinates to grid coordinates
            let col = Math.floor(canvasX / cellSize) + Math.abs(mouseXOff % numCols);
            let row = Math.floor(canvasY / cellSize) + Math.abs(mouseYOff % numRows);

            // console.log(`Grid cell at (${row}, ${col})`);

            // Ensure the coordinates are within the grid boundaries
            if (col >= 0 && col < numCols && row >= 0 && row < numRows) {
                gameState[row][col] = {...gameState[row][col], alive: 1, age:  0}; // Activate the cell (make it alive)
            }

            return [col,row]
        }

        function ranInt (max) {
            return Math.floor(Math.random()*max)
        }
